<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anachrogen — Authentic or Anachronistic?</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ============================ GALLERY ============================ -->
  <section id="gallery" class="view">
    <header class="gallery-head">
      <h1 class="wordmark">Anachrogen</h1>
      <p class="tagline">Spot the anachronism. Some marked details are real while others were invented.
        <strong>Authentic or anachronistic?</strong></p>
      <div id="mode-toggle" class="mode-toggle" role="group" aria-label="Game mode">
        <button class="mode-btn" data-mode="solo" type="button">Play solo</button>
        <button class="mode-btn" data-mode="presenter" type="button">Presenter</button>
      </div>
      <div id="scoreboard" class="scoreboard" hidden>
        <span id="scoreboard-text" class="scoreboard-text"></span>
        <button id="scoreboard-reset" class="scoreboard-reset" type="button">Reset score</button>
      </div>
    </header>
    <div id="gallery-tools" class="gallery-tools"><!-- hide/restore controls injected by app.js --></div>
    <div id="gallery-grid" class="gallery-grid"><!-- cards injected by app.js --></div>
    <footer id="gallery-foot" class="gallery-foot"><!-- mode-specific hint injected by app.js --></footer>
  </section>

  <!-- ============================= SCENE ============================= -->
  <section id="scene" class="view" hidden>
    <div class="stage">
      <!-- image + markers -->
      <div class="canvas-wrap">
        <div id="canvas" class="canvas">
          <img id="scene-img" class="scene-img" alt="" />
          <div id="markers" class="markers"><!-- markers injected --></div>
        </div>
        <div class="chip">
          <span id="scene-title" class="chip-title"></span>
          <span id="scene-date" class="chip-date"></span>
        </div>
        <div id="author-readout" class="author-readout" hidden></div>

        <!-- reference overlay: the real historical image, for side-by-side comparison -->
        <div id="reference" class="reference" hidden>
          <span class="reference-tag">Real reference</span>
          <button id="reference-close" class="reference-close" type="button" title="Back to the AI image (C)">Close &#10005;</button>
          <img id="reference-img" class="reference-img" alt="" />
          <div class="reference-bar">
            <p id="reference-caption" class="reference-caption"></p>
            <a id="reference-credit" class="reference-credit" target="_blank" rel="noopener noreferrer"></a>
          </div>
        </div>
      </div>

      <!-- side panel: prompt, item list, controls -->
      <aside class="panel">
        <p id="scene-prompt" class="prompt"></p>
        <ol id="item-list" class="item-list"><!-- list rows injected --></ol>

        <div class="panel-foot">
          <div id="counter" class="counter"></div>

          <!-- SOLO: answer the current marker -->
          <div id="solo-answer" class="solo-answer" hidden>
            <p id="solo-question" class="solo-question"></p>
            <div class="solo-choices">
              <button id="solo-authentic" class="btn solo-btn solo-btn-auth"  type="button">&#10003; Authentic</button>
              <button id="solo-wrong"     class="btn solo-btn solo-btn-wrong" type="button">&#10007; Got it wrong</button>
            </div>
            <p id="solo-feedback" class="solo-feedback" hidden></p>
            <button id="solo-next" class="btn btn-primary" type="button" hidden>Next marker &rarr;</button>
          </div>

          <!-- SOLO: scene results -->
          <div id="solo-results" class="solo-results" hidden>
            <p id="solo-results-score" class="solo-results-score"></p>
            <p id="solo-results-session" class="solo-results-session"></p>
            <div class="solo-results-actions">
              <button id="solo-replay" class="btn" type="button">Play again</button>
              <button id="solo-menu"   class="btn btn-primary" type="button">More scenes &rarr;</button>
            </div>
          </div>

          <!-- PRESENTER: reveal controls -->
          <div class="controls">
            <button id="btn-back"    class="btn"        title="Back to gallery (Esc)">&larr; Scenes</button>
            <button id="btn-reset"   class="btn presenter-only" title="Hide all verdicts (R)">Reset</button>
            <button id="btn-all"     class="btn presenter-only" title="Reveal every verdict (A)">Reveal all</button>
            <button id="btn-compare" class="btn presenter-only" title="Compare with the real image (C)" hidden>Compare &#9650;&#9660;</button>
            <button id="btn-next"    class="btn btn-primary presenter-only" title="Reveal next verdict (Space / →)">Reveal next &rarr;</button>
          </div>
          <p class="hint presenter-only">
            <kbd>Space</kbd> reveal next &middot; <kbd>A</kbd> all &middot;
            <kbd>R</kbd> reset &middot; <kbd>C</kbd> compare &middot; <kbd>Esc</kbd> back &middot; <kbd>D</kbd> author mode
          </p>
        </div>
      </aside>
    </div>
  </section>

  <script src="scenes.js"></script>
  <script src="app.js"></script>
</body>
</html>
