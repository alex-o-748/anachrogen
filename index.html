<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anachrogen — Authentic or Anachronistic?</title>
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
  <!-- ============================ GALLERY ============================ -->
  <section id="gallery" class="view">
    <header class="gallery-head">
      <h1 class="wordmark">Anachrogen</h1>
      <p class="tagline">Spot the anachronism. Every image was generated by AI &mdash;
        some marked details are real history, some the model invented.
        <strong>Authentic or anachronistic?</strong></p>
    </header>
    <div id="gallery-grid" class="gallery-grid"><!-- cards injected by app.js --></div>
    <footer class="gallery-foot">
      Pick a scene to begin &middot; press <kbd>1</kbd>&ndash;<kbd>9</kbd> to jump straight in
    </footer>
  </section>

  <!-- ============================= SCENE ============================= -->
  <section id="scene" class="view" hidden>
    <div class="stage">
      <!-- image + markers -->
      <div class="canvas-wrap">
        <div id="canvas" class="canvas">
          <img id="scene-img" class="scene-img" alt="" />
          <div id="markers" class="markers"><!-- markers injected --></div>
        </div>
        <div class="chip">
          <span id="scene-title" class="chip-title"></span>
          <span id="scene-date" class="chip-date"></span>
        </div>
        <div id="author-readout" class="author-readout" hidden></div>
      </div>

      <!-- side panel: prompt, item list, controls -->
      <aside class="panel">
        <p id="scene-prompt" class="prompt"></p>
        <ol id="item-list" class="item-list"><!-- list rows injected --></ol>

        <div class="panel-foot">
          <div id="counter" class="counter"></div>
          <div class="controls">
            <button id="btn-back"   class="btn"        title="Back to gallery (Esc)">&larr; Scenes</button>
            <button id="btn-reset"  class="btn"        title="Hide all verdicts (R)">Reset</button>
            <button id="btn-all"    class="btn"        title="Reveal every verdict (A)">Reveal all</button>
            <button id="btn-next"   class="btn btn-primary" title="Reveal next verdict (Space / →)">Reveal next &rarr;</button>
          </div>
          <p class="hint">
            <kbd>Space</kbd> reveal next &middot; <kbd>A</kbd> all &middot;
            <kbd>R</kbd> reset &middot; <kbd>Esc</kbd> back &middot; <kbd>D</kbd> author mode
          </p>
        </div>
      </aside>
    </div>
  </section>

  <!-- Bump ?v= on every asset edit so browsers/CDN don't serve a stale copy. -->
  <script src="scenes.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
